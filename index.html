<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그로스진 웰니스 레터</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f4f0; font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; color: #2c2c2c; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 48px 24px; }
  .header { text-align: center; margin-bottom: 48px; }
  .logo { font-size: 28px; font-weight: 800; color: #1a1a1a; letter-spacing: -1px; }
  .logo span { color: #E8570A; }
  .tagline { font-size: 14px; color: #999; margin-top: 6px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card { background: #fff; border-radius: 14px; overflow: hidden; border: 1px solid #eee; text-decoration: none; color: inherit; display: block; transition: transform 0.15s, box-shadow 0.15s; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .card-top { background: #f7f3ee; padding: 24px 20px 20px; }
  .card-badge { display: inline-block; background: #E8570A; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; letter-spacing: 1px; }
  .card-title { font-size: 17px; font-weight: 800; color: #1a1a1a; line-height: 1.35; }
  .card-body { padding: 16px 20px; }
  .card-desc { font-size: 13px; color: #777; line-height: 1.6; margin-bottom: 12px; }
  .card-meta { font-size: 12px; color: #bbb; }
  .section-label { font-size: 13px; font-weight: 700; color: #999; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
  footer { text-align: center; margin-top: 56px; font-size: 12px; color: #bbb; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">growth<span>gene</span></div>
    <div class="tagline">슬로우에이징 · 대사건강 · 웰니스 뉴스레터</div>
  </div>

  <div class="section-label">2026년 6월</div>
  <div class="grid">
    <a href="newsletters/2026-06/fake-hunger/" class="card">
      <div class="card-top">
        <div class="card-badge">가짜 허기</div>
        <div class="card-title">방금 밥 먹었는데<br>또 배고프다고요?</div>
      </div>
      <div class="card-body">
        <div class="card-desc">가짜 허기의 과학적 원인과 즉시 실천 가능한 3가지 해결법</div>
        <div class="card-meta">2026. 06. 03</div>
      </div>
    </a>
  </div>

  <footer>@growthgene · GrowthGene Wellness Letter</footer>
</div>
</body>
</html>
